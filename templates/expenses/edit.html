{% extends "base.html" %}
{% block title %}Edit expense — Spendly{% endblock %}

{% block content %}
<div class="form-page">

    <div class="page-header">
        <div>
            <h1 class="page-title">Edit expense</h1>
            <p class="page-subtitle">Update the details below</p>
        </div>
    </div>

    <div class="form-card">
        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('edit_expense', id=expense_id) }}">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" class="form-input"
                       value="{{ form.get('title', '') }}" required autofocus>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount" class="form-input"
                           step="0.01" min="0.01" value="{{ form.get('amount', '') }}" required>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" class="form-input"
                           value="{{ form.get('date', '') }}" required>
                </div>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" class="form-input" required>
                    {% for cat in categories %}
                    <option value="{{ cat }}" {{ 'selected' if form.get('category') == cat }}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="note">Note <span style="color:var(--ink-faint);">(optional)</span></label>
                <input type="text" id="note" name="note" class="form-input"
                       placeholder="Any details…" value="{{ form.get('note', '') }}">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit" style="width:auto; padding: 0.65rem 1.5rem;">
                    Save changes
                </button>
                <a href="{{ url_for('dashboard') }}" class="btn-ghost">Cancel</a>
            </div>
        </form>
    </div>

</div>
{% endblock %}
